services:
  stock-noti-bot:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-your-github-username}/stock-noti-bot:latest
    container_name: stock-noti-bot
    build: .
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ~/sqlite3:/root/sqlite3
    environment:
      - TZ=Asia/Seoul
    stdin_open: true
    tty: true
