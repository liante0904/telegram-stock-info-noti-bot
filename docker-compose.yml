services:
  gemini-pdf-batch:
    image: ${DOCKER_IMAGE_NAME:-ghcr.io/liante0904/stock-noti-bot:latest}
    container_name: gemini-pdf-batch
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ~/log:/log
      - ~/sqlite3:/root/sqlite3
    environment:
      - TZ=Asia/Seoul
      - LOG_BASE_DIR=/log
      - LOG_FILE=/log/logfile.log
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
